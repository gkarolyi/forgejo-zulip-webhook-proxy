services:
  proxy:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"   # webhook endpoint
      - "3000:3000"   # web UI
    environment:
      # Required: Zulip Gitea integration URL. The api_key param is also used
      # for bot API calls; the site URL is derived from the host.
      ZULIP_GITEA_WEBHOOK_URL: "https://chat.example.org/api/v1/external/gitea?api_key=XXX"

      # Required: bot email for review/assign/label notifications
      ZULIP_BOT_EMAIL: "bot@example.org"

      # Optional
      # WEBHOOK_SECRET: "..."     # shared secret for HMAC signature validation
      # UI_PASSWORD: "..."        # password for web UI Basic auth (no auth if unset)
      # PORT: "8080"              # webhook listener port
      # UI_PORT: "3000"           # web UI listener port
