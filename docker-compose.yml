services:
  proxy:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Required: Zulip Gitea integration endpoint (api_key only — stream and topic
      # are injected per-request from the Forgejo webhook URL query params)
      ZULIP_GITEA_WEBHOOK_URL: "https://chat.example.org/api/v1/external/gitea?api_key=XXX"

      # Required for review notifications (bot API)
      ZULIP_SITE: "https://chat.example.org"
      ZULIP_BOT_EMAIL: "bot@example.org"
      ZULIP_BOT_API_KEY: "your-bot-api-key"

      # Optional
      # FORGEJO_SECRET: "..."     # shared secret for HMAC signature validation
      # PORT: "8080"
